name: Dida365 Inbox Sorter

on:
  schedule:
    # 每小时运行一次（每小时的第0分钟）
    - cron: '0 * * * *'
  workflow_dispatch:
    # 手动触发

jobs:
  sort-inbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Dida365 Sorter
        run: python dida365_sorter_gh.py

      - name: Upload result
        if: always()
        run: cat result.json 2>/dev/null || echo "No result"
